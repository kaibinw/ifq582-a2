{% extends "base.html" %}

{% block title %}Register | Ngurra Digital Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card-charcoal p-4 rounded shadow-sm">
            <h2 class="display-5 mb-1 text-center">Create Account</h2>
            <hr class="accent-line mb-4 mx-auto" style="width: 60px; border-top: 2px solid var(--burntorange);">
            
            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('main.register') }}">
                <div class="form-group mb-3">
                    <label class="form-label" for="userEmail">Email Address</label>
                    <input type="email" class="form-control" id="userEmail" name="email" placeholder="email@ngurra.edu.au" required>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="userPassword">Password</label>
                    <input type="password" class="form-control" id="userPassword" name="password" placeholder="Password" required>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="userPasswordConfirm">Confirm Password</label>
                    <input type="password" class="form-control" id="userPasswordConfirm" name="password_confirm" placeholder="Confirm Password" required>
                    <!-- TODO: Jordan - validate that passwords match -->
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-outline-light">Create Account</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

    // check password length
    // verify passwords match
    // handle duplicate email rego
</script>
{% endblock %}
