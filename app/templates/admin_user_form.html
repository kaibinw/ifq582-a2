{% extends "base.html" %}

{% block title %}{% if is_edit %}Edit{% else %}Create{% endif %}User | Ngurra Digital Library{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">{% if is_edit %}Edit User{% else %}Create New User{% endif %}</h2>

            <form method="POST">
                <div class="form-group mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ user['userEmail'] if is_edit else '' }}" required>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Password {% if is_edit %}(Leave blank to keep current){% endif %}</label>
                    <input type="password" name="password" class="form-control" {% if not is_edit %}required{% endif %}>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Honourific (Optional)</label>
                    <input type="text" name="honourific" class="form-control" placeholder="e.g Aunty, Uncle" value="{{ user['userHonourific'] if is_edit else '' }}">
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user['userFirstName'] if is_edit else '' }}" required>
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user['userLastName'] if is_edit else '' }}" required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="">Select a Role</option>
                        <option value="Public" {% if is_edit and user['userRole'] == 'Public' %}selected{% endif %}>Public</option>
                        <option value="Curator" {% if is_edit and user['userRole'] == 'Curator' %}selected{% endif %}>Library Staff</option>
                        <option value="Elder" {% if is_edit and user['userRole'] == 'Elder' %}selected{% endif %}>Community Reviewer/Elder</option>
                        <option value="Admin" {% if is_edit and user['userRole'] == 'Admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">{% if is_edit %}Update User{% else %}Create User{% endif %}</button>
                    <a href="{{ url_for('main.admin_users') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
