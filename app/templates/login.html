{% extends "base.html" %}

{% block title %}Login | Ngurra Digital Library{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card-charcoal p-4 rounded shadow-sm">
            <h2 class="display-5 mb-1 text-center">Login</h2>
            <hr class="accent-line mb-4 mx-auto" style="width: 60px; border-top: 2px solid var(--burntorange);">
            
            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('main.login') }}">
                <div class="form-group mb-3">
                    <label class="form-label" for="userEmail">Email Address</label>
                    <input type="email" class="form-control" id="userEmail" name="email" placeholder="email@ngurra.edu.au" required>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label" for="userPassword">Password</label>
                    <input type="password" class="form-control" id="userPassword" name="password" placeholder="Password" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-outline-light">Sign In</button>
                </div>

                <div class="text-center mt-3">
                    <small>
                        Don't have an account?
                        <a href="{{ url_for('main.register') }}" class="text-warning">Sign Up</a>
                    </small>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.querySelectorAll('.cred-row').forEach(function(row) {
        row.addEventListener('click', function() {
            document.getElementById('userEmail').value = this.dataset.email;
            document.getElementById('userPassword').value = this.dataset.password;

            // Highlight the selected row and clear others
            document.querySelectorAll('.cred-row').forEach(r => r.classList.remove('table-warning'));
            this.classList.add('table-warning');
        });
    });
</script>
{% endblock %}
